name: Build DEB

on:
  workflow_call:

jobs:
  build-deb:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y \
            cmake \
            g++ \
            make \
            libgtkmm-3.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            debhelper \
            devscripts \
            build-essential
      
      - name: Create build directory
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)
      
      - name: Prepare Debian package structure
        run: |
          PKG_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}"
          PKG_VERSION="${PKG_VERSION#v}"

          mkdir -p debian-package
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/applications
          mkdir -p debian-package/DEBIAN
          
          [ -f build/eclipselock ] && cp build/eclipselock debian-package/usr/bin/ || \
            echo "No GUI binary built (GTKmm not available)"
          
          cat > debian-package/DEBIAN/control << EOF
          Package: eclipselock
          Version: ${PKG_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtkmm-3.0-1v5, libssl3t64, libgtk-3-0, libx11-6, libxrandr2, libxinerama1, libglu1-mesa
          Maintainer: Jan Fidra <tkmxqrd@gmail.com>
          Description: Secure file encryption tool with modern GUI
           EclipseLock is a file encryption tool that uses AES-256-CBC
           encryption. It features both a modern graphical interface
           and command-line options.
          EOF
          
          cat > debian-package/usr/share/applications/eclipselock.desktop << EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=EclipseLock
          GenericName=File Encryption
          Comment=Secure file encryption tool with AES-256-CBC
          Exec=/usr/bin/eclipselock
          Icon=eclipselock
          Terminal=false
          Categories=Utility;Security;
          Keywords=encryption;security;file;password;
          EOF
      
      - name: Build .deb package
        run: |
          PKG_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}"
          PKG_VERSION="${PKG_VERSION#v}"
          cd debian-package
          dpkg-deb --build . "../eclipselock_${PKG_VERSION}_amd64.deb"
      
      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipselock-deb
          path: eclipselock_*.deb
          retention-days: 30