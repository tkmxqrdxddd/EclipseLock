name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: fedora:39
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install build dependencies
        run: |
          dnf -y install \
            gcc-c++ \
            cmake \
            make \
            wxGTK-devel \
            wxGTK-gl \
            wxGTK-media \
            wxGTK-webview \
            openssl-devel \
            libX11-devel \
            libXrandr-devel \
            libXinerama-devel \
            libxcrypt-devel \
            mesa-libGLU-devel \
            gtk3-devel \
            diffutils \
            podman
          dnf clean all
      
      - name: Build with CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
      
      - name: Test CLI functionality
        run: |
          cd build
          ./eclipselock help
          echo "test content" > /tmp/test.txt
          ./eclipselock encrypt /tmp/test.txt testpassword123
          ./eclipselock decrypt /tmp/test.txt.enc testpassword123 -o /tmp/test.txt.dec
          diff /tmp/test.txt.dec /tmp/test.txt && echo "CLI test passed!"
      
      - name: Build container image
        run: |
          podman build -f Podmanfile -t eclipselock-test .
      
      - name: Run container tests
        run: |
          podman run --rm eclipselock-test help

  build-nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Nix
        uses: cachix/install-nix-action@v25
        with:
          nix_path: nixpkgs=channel:nixos-24.05
      
      - name: Build with nix-shell
        run: |
          nix-shell --run "mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release && make -j4"
      
      - name: Test CLI
        run: |
          nix-shell --run "cd build && ./eclipselock help && echo 'test' > /tmp/nixtest.txt && ./eclipselock encrypt /tmp/nixtest.txt pass12345 && ./eclipselock decrypt /tmp/nixtest.txt.enc pass12345 && cat /tmp/nixtest.txt"
