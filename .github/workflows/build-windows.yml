name: Build Windows

on:
  workflow_call:

jobs:
  build-windows:
    runs-on: ubuntu-latest
    container:
      image: fedora:39

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install \
            mingw64-gcc-c++ \
            mingw64-openssl \
            cmake \
            make \
            diffutils
          dnf clean all

      - name: Note on GTKmm Windows support
        run: |
          echo "Windows cross-compilation for GTKmm-based EclipseLock is currently unavailable."
          echo "EclipseLock v2.x uses GTKmm 3.0, which requires MSYS2 or WSL for Windows builds."
          echo "This workflow remains as a placeholder for future improvements."
