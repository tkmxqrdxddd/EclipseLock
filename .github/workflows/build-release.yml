name: Build, Test and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  code-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            cmake \
            make \
            libwxgtk3.2-dev \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            libgtk-3-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  build-windows:
    needs: code-safety
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-make mingw-w64-x86_64-cmake mingw-w64-x86_64-gcc mingw-w64-x86_64-wxwidgets3.2-msw

      - name: Build Windows executable
        shell: msys2 {0}
        run: |
          export PATH="/mingw64/bin:$PATH"
          cp -r assets build-windows/
          cd build-windows
          cmake .. -G "MinGW Makefiles" -DCMAKE_BUILD_TYPE=Release
          mingw32-make -j$(nproc)

      - name: Upload Windows exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipselock-windows-exe
          path: build-windows/eclipselock.exe
          retention-days: 30

  build-deb:
    needs: code-safety
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            make \
            libwxgtk3.2-dev \
            libssl-dev \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            debhelper \
            devscripts \
            build-essential

      - name: Create build directory
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)

      - name: Prepare Debian package structure
        run: |
          mkdir -p debian-package
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/applications
          mkdir -p debian-package/usr/share/icons/hicolor/128x128/apps
          mkdir -p debian-package/DEBIAN
          
          cp build/eclipselock debian-package/usr/bin/
          
          cat > debian-package/DEBIAN/control << EOF
          Package: eclipselock
          Version: ${GITHUB_REF#refs/tags/v}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libwxgtk3.2-1, libssl3t64, libgtk-3-0, libx11-6, libxrandr2, libxinerama1, libglu1-mesa
          Maintainer: Jan Fidra <tkmxqrd@gmail.com>
          Description: Secure file encryption tool with modern GUI
           EclipseLock is a file encryption tool that uses AES-256-CBC
           encryption. It features both a modern graphical interface
           and command-line options.
          EOF
          
          cat > debian-package/usr/share/applications/eclipselock.desktop << EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=EclipseLock
          GenericName=File Encryption
          Comment=Secure file encryption tool with AES-256-CBC
          Exec=/usr/bin/eclipselock
          Icon=eclipselock
          Terminal=false
          Categories=Utility;Security;
          Keywords=encryption;security;file;password;
          EOF

      - name: Build .deb package
        run: |
          cd debian-package
          dpkg-deb --build . ../eclipselock_${GITHUB_REF#refs/tags/v}_amd64.deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipselock-deb
          path: eclipselock_*.deb
          retention-days: 30

  release:
    needs: [build-windows, build-deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: eclipselock-windows-exe
          path: artifacts/

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: eclipselock-deb
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/eclipselock.exe
            artifacts/eclipselock_*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
