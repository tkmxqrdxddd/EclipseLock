name: Build, Test and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  code-safety:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            g++ \
            cmake \
            make \
            libgtkmm-3.0-dev \
            libssl-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            libgtk-3-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Build and run tests
        run: |
          mkdir -p build-tests
          cd build-tests
          cmake .. -DBUILD_TESTS=ON
          make -j$(nproc)
          ctest --output-on-failure

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  build-windows:
    needs: code-safety
    runs-on: ubuntu-latest
    container:
      image: fedora:39
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install MinGW toolchain
        run: |
          dnf -y install \
            mingw64-gcc-c++ \
            mingw64-openssl \
            cmake \
            make \
            git
          dnf clean all

      - name: Build tests (CLI only — no GTKmm for MinGW)
        run: |
          mkdir -p build
          cd build
          cmake .. \
            -DBUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_CXX_COMPILER=x86_64-w64-mingw32-g++ \
            -DCMAKE_RC_COMPILER=x86_64-w64-mingw32-windres \
            -DCMAKE_FIND_ROOT_PATH=/usr/x86_64-w64-mingw32 \
            -DCMAKE_FIND_ROOT_PATH_MODE_PROGRAM=NEVER \
            -DCMAKE_FIND_ROOT_PATH_MODE_LIBRARY=ONLY \
            -DCMAKE_FIND_ROOT_PATH_MODE_INCLUDE=ONLY
          make -j$(nproc) eclipselock_tests

      - name: Note
        run: |
          echo "---"
          echo "Windows GUI build (GTKmm) is not available via MinGW cross-compilation."
          echo "For native Windows builds, use MSYS2 or WSL."

  build-deb:
    needs: code-safety
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            make \
            libgtkmm-3.0-dev \
            libssl-dev \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libglu1-mesa-dev \
            debhelper \
            devscripts \
            build-essential

      - name: Build binary
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr
          make -j$(nproc)

      - name: Prepare Debian package structure
        run: |
          PKG_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}"
          PKG_VERSION="${PKG_VERSION#v}"

          mkdir -p debian-package
          mkdir -p debian-package/usr/bin
          mkdir -p debian-package/usr/share/applications
          mkdir -p debian-package/DEBIAN
          
          cp build/eclipselock debian-package/usr/bin/
          
          cat > debian-package/DEBIAN/control << EOF
          Package: eclipselock
          Version: ${PKG_VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtkmm-3.0-1v5, libssl3t64, libgtk-3-0, libx11-6, libxrandr2, libxinerama1, libglu1-mesa
          Maintainer: Jan Fidra <tkmxqrd@gmail.com>
          Description: Secure file encryption tool with modern GUI
           EclipseLock is a file encryption tool that uses AES-256-CBC
           encryption. It features both a modern graphical interface
           and command-line options.
          EOF
          
          cat > debian-package/usr/share/applications/eclipselock.desktop << EOF
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=EclipseLock
          GenericName=File Encryption
          Comment=Secure file encryption tool with AES-256-CBC
          Exec=/usr/bin/eclipselock
          Icon=eclipselock
          Terminal=false
          Categories=Utility;Security;
          Keywords=encryption;security;file;password;
          EOF

      - name: Build .deb package
        run: |
          PKG_VERSION="${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || github.sha }}"
          PKG_VERSION="${PKG_VERSION#v}"
          cd debian-package
          dpkg-deb --build . "../eclipselock_${PKG_VERSION}_amd64.deb"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: eclipselock-deb
          path: eclipselock_*.deb
          retention-days: 30

  release:
    needs: [build-deb]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: eclipselock-deb
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/eclipselock_*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
