name: Build, Test and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  code-safety:
    runs-on: ubuntu-latest
    container:
      image: fedora:39

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          dnf -y install \
            gcc-c++ \
            cmake \
            make \
            wxGTK-devel \
            openssl-devel \
            libX11-devel \
            libXrandr-devel \
            libXinerama-devel \
            libxcrypt-devel \
            mesa-libGLU-devel \
            gtk3-devel \
            diffutils
          dnf clean all

      - name: Build
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp

      - name: Run CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"

  build-and-release:
    needs: code-safety
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Windows
        uses: ./.github/workflows/build-windows.yml

      - name: Build DEB
        uses: ./.github/workflows/build-deb.yml

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: eclipselock-windows-exe
          path: artifacts/

      - name: Download DEB artifact
        uses: actions/download-artifact@v4
        with:
          name: eclipselock-deb
          path: artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/eclipselock.exe
            artifacts/eclipselock_*.deb
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}